<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="icon" href="data:,">
  <title>🏪 نظام إدارة المتجر</title>
    <link rel="stylesheet" href="style.css">
  <script src="currency.js"></script>
</head>

<body>

<div class="container">
  <div class="header">
    <div class="header-content">
            <h1>🏪 نظام إدارة المتجر</h1>
    </div>
    <p>برنامج إدارة منتجات للمحل التجاري - متصل بقاعدة البيانات</p>
  </div>

  <div class="connection-status status-disconnected" id="connectionStatus">
    🔌 جاري الاتصال بقاعدة البيانات...
  </div>

  <div class="stats-container" id="statsContainer">
    <div class="stat-card">
      <div class="stat-number" id="totalProducts">0</div>
      <div class="stat-label">إجمالي المنتجات</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="totalStock">0</div>
      <div class="stat-label">إجمالي المخزون</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="totalValue">0</div>
      <div class="stat-label">قيمة المخزون</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="lowStock">0</div>
      <div class="stat-label">منتجات منخفضة</div>
    </div>
  </div>

  <div class="main-content">
    <!-- قسم النموذج -->
    <div class="form-section">
      <h2 id="formTitle">➕ إضافة منتج جديد</h2>
      
      <div class="form-group">
        <label>اسم المنتج</label>
        <input type="text" id="name" placeholder="أدخل اسم المنتج">
      </div>
      
      <div class="form-group">
        <label>الفئة</label>
        <input type="text" id="category" placeholder="أدخل فئة المنتج">
      </div>
      
      <div class="form-group">
        <label>سعر الشراء</label>
        <div class="input-group">
          <span class="input-prefix currency-symbol"></span>
          <input type="number" id="purchase" placeholder="سعر الشراء" step="0.01">
        </div>
      </div>
      
      <div class="form-group">
        <label>سعر البيع</label>
        <div class="input-group">
          <span class="input-prefix currency-symbol"></span>
          <input type="number" id="sale" placeholder="سعر البيع" step="0.01">
        </div>
      </div>
      
      <div class="form-group">
        <label>الكمية</label>
        <input type="number" id="qty" placeholder="الكمية المتاحة">
      </div>
      
      <div class="form-buttons">
        <button class="btn btn-primary" onclick="saveProduct()">💾 حفظ</button>
        <button class="btn btn-secondary" onclick="clearInputs()">🔄 مسح</button>
      </div>
    </div>

    <!-- قسم الجدول -->
    <div class="table-section">
      <div class="table-header">
        <h2>📦 قائمة المنتجات</h2>
        <div class="search-container">
          <span class="search-icon">🔍</span>
          <input type="text" id="search" placeholder="البحث عن منتج..." oninput="searchProducts()">
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>الاسم</th>
              <th>الفئة</th>
              <th>سعر الشراء</th>
              <th>سعر البيع</th>
              <th>الكمية</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- سيتم ملؤها بواسطة JavaScript -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
