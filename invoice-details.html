<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="google" content="notranslate">
  <link rel="icon" href="data:,">
  <title>فاتورة</title>
  <style type="text/css">
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Times New Roman', serif;
      background: #e0e0e0;
      padding: 20px;
      direction: rtl;
    }
    
    .pdf-document {
      background: white;
      max-width: 210mm;
      margin: 0 auto;
      padding: 20mm;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      position: relative;
    }
    
    .pdf-header {
      margin-bottom: 30px;
      border-bottom: 2px solid #000;
      padding-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .company-name {
      font-size: 20px;
      font-weight: bold;
      color: #000;
      margin-bottom: 5px;
    }
    
    .company-address {
      font-size: 12px;
      color: #333;
      margin-bottom: 15px;
    }
    
    .invoice-title {
      font-size: 24px;
      font-weight: bold;
      color: #000;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    
    .company-info {
      text-align: right;
    }
    
    .invoice-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
      padding: 15px;
      border: 1px solid #ddd;
      background: #f9f9f9;
    }
    
    .info-item {
      text-align: center;
    }
    
    .info-label {
      font-size: 11px;
      color: #666;
      margin-bottom: 3px;
      text-transform: uppercase;
    }
    
    .info-value {
      font-size: 14px;
      font-weight: bold;
      color: #000;
    }
    
    .items-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
      font-size: 12px;
      border: 2px solid #000;
      table-layout: auto;
    }
    
    .items-table th {
      background: #333;
      color: white;
      padding: 12px 8px;
      text-align: center;
      font-weight: bold;
      border: 1px solid #000;
      font-size: 14px;
    }
    
    .items-table td {
      padding: 10px 8px;
      text-align: center;
      border: 1px solid #000;
      vertical-align: middle;
      font-size: 12px;
    }
    
    .items-table tr:nth-child(even) {
      background: #f5f5f5;
    }
    
    .total-section {
      text-align: left;
      margin-top: 30px;
      padding: 15px;
      border: 2px solid #000;
      background: #f9f9f9;
    }
    
    .total-label {
      font-size: 14px;
      color: #333;
      margin-bottom: 5px;
      font-weight: bold;
    }
    
    .total-amount {
      font-size: 24px;
      font-weight: bold;
      color: #000;
    }
    
    .action-buttons {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      display: flex;
      gap: 10px;
      z-index: 1000;
    }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.3s;
    }
    
    .btn-print {
      background: #2196F3;
      color: white;
    }
    
    .btn-print:hover {
      background: #1976D2;
    }
    
    .btn-cancel {
      background: #f44336;
      color: white;
    }
    
    .btn-cancel:hover {
      background: #d32f2f;
    }
    
    .loading, .error {
      text-align: center;
      padding: 40px;
      font-size: 14px;
    }
    
    .loading {
      color: #666;
    }
    
    .error {
      color: #d32f2f;
    }
    
    @media print {
      body {
        background: white !important;
        padding: 0 !important;
        margin: 0 !important;
        size: A4;
        font-family: 'Times New Roman', serif !important;
        -webkit-print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
      
      .pdf-document {
        box-shadow: none !important;
        margin: 0 !important;
        padding: 15mm !important;
        max-width: 100% !important;
        width: 100% !important;
        min-height: 100vh !important;
        height: 100vh !important;
        page-break-after: avoid;
        page-break-inside: avoid;
        position: relative;
      }
      
      .action-buttons {
        display: none !important;
      }
      
      .pdf-header {
        margin-bottom: 15mm !important;
      }
      
      .company-name { 
        font-size: 18px !important; 
        font-weight: bold !important;
        margin-bottom: 3mm !important;
      }
      
      .company-address { 
        font-size: 12px !important; 
        margin-bottom: 2mm !important;
      }
      
      .company-contact { 
        font-size: 11px !important;
      }
      
      .invoice-title { 
        font-size: 20px !important; 
        font-weight: bold !important;
        margin-bottom: 10mm !important;
        text-align: center !important;
      }
      
      .invoice-info {
        margin-bottom: 10mm !important;
      }
      
      .info-item {
        margin-bottom: 3mm !important;
      }
      
      .info-label { 
        font-size: 11px !important;
        font-weight: bold !important;
        color: #333 !important;
      }
      
      .info-value { 
        font-size: 11px !important;
        color: #333 !important;
      }
      
      .items-table {
        width: 100% !important;
        margin-bottom: 10mm !important;
        border-collapse: collapse !important;
        table-layout: fixed !important;
      }
      
      .items-table th { 
        padding: 8px !important;
        font-size: 11px !important;
        font-weight: bold !important;
        background: #333 !important;
        color: white !important;
        border: 1px solid #000 !important;
        text-align: center !important;
        width: 25% !important;
      }
      
      .items-table td { 
        padding: 8px !important;
        font-size: 10px !important;
        border: 1px solid #000 !important;
        vertical-align: middle !important;
        text-align: center !important;
        width: 25% !important;
      }
      
      .items-table tr:nth-child(even) {
        background: #f5f5f5 !important;
      }
      
      .total-section {
        margin-top: 15mm !important;
        padding: 10mm !important;
        border: 2px solid #000 !important;
        text-align: left !important;
      }
      
      .total-label {
        font-size: 14px !important;
        font-weight: bold !important;
        color: #333 !important;
        margin-bottom: 5mm !important;
      }
      
      .total-amount { 
        font-size: 18px !important;
        font-weight: bold !important;
        color: #000 !important;
      }
      
      html, body {
        height: auto !important;
        min-height: auto !important;
        overflow: visible !important;
      }
      
      * {
        page-break-after: auto;
        page-break-inside: avoid;
      }
    }
  </style>
</head>

<body>

<div class="pdf-document">
  <!-- Header -->
  <div class="pdf-header">
    <div class="invoice-title">فاتورة</div>
    <div class="company-info">
      <div class="company-name">مركز الرحمن للتنمية الزراعية</div>
      <div class="company-address">القنيطرة، نبع الصخر، الساحة العامة</div>
      <div class="company-contact">📞 00963-938-838-752</div>
    </div>
  </div>
  
  <!-- Invoice Info -->
  <div class="invoice-info">
    <div class="info-item">
      <div class="info-label">رقم الفاتورة</div>
      <div class="info-value" id="invoiceNumber">-</div>
    </div>
    <div class="info-item">
      <div class="info-label">التاريخ</div>
      <div class="info-value" id="invoiceDate">-</div>
    </div>
    <div class="info-item">
      <div class="info-label">الإجمالي</div>
      <div class="info-value" id="totalAmount">-</div>
    </div>
  </div>
  
  <!-- Items Table -->
  <table class="items-table">
    <thead>
      <tr>
        <th>المنتج</th>
        <th>الفئة</th>
        <th>الكمية</th>
        <th>السعر</th>
      </tr>
    </thead>
    <tbody id="itemsTableBody">
      <tr>
        <td colspan="4" class="loading">جاري تحميل بيانات الفاتورة...</td>
      </tr>
    </tbody>
  </table>
  
  <!-- Total Section -->
  <div class="total-section">
    <div class="total-label">المبلغ الإجمالي</div>
    <div class="total-amount" id="grandTotal">-</div>
  </div>
</div>

<!-- Action Buttons -->
<div class="action-buttons">
  <button class="btn btn-print" onclick="printInvoice()">🖨️ طباعة</button>
  <button class="btn btn-cancel" onclick="closeWindow()">✖️ إغلاق</button>
</div>

<script>
  // Format price function (backup)
  function formatPrice(price) {
    return new Intl.NumberFormat('ar-SA', {
      style: 'currency',
      currency: 'SYP',
      minimumFractionDigits: 0,
      maximumFractionDigits: 0
    }).format(price || 0);
  }
</script>
<script src="invoice-details.js"></script>

<script>
// Get invoice ID from URL
const urlParams = new URLSearchParams(window.location.search);
const invoiceId = urlParams.get('id');

if (!invoiceId) {
  document.getElementById('itemsTableBody').innerHTML = '<tr><td colspan="4" class="error">رقم الفاتورة مطلوب</td></tr>';
} else {
  loadInvoiceDetails();
}

async function loadInvoiceDetails() {
  try {
    const response = await fetch(`http://localhost:3001/api/invoice/${invoiceId}`);
    
    if (!response.ok) {
      throw new Error('Invoice not found');
    }
    
    const invoice = await response.json();
    
    // Update header info
    document.getElementById('invoiceNumber').textContent = invoice.invoice_number;
    document.getElementById('invoiceDate').textContent = invoice.created_at ? 
      (() => {
        const date = new Date(invoice.created_at);
        const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
        return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
      })() : '-';
    
    const totalPrice = formatPrice(invoice.total_price);
    document.getElementById('totalAmount').textContent = totalPrice;
    document.getElementById('grandTotal').textContent = totalPrice;
    
    // Update items table
    if (!invoice.items || invoice.items.length === 0) {
      document.getElementById('itemsTableBody').innerHTML = '<tr><td colspan="4" class="error">لا توجد عناصر في هذه الفاتورة</td></tr>';
      return;
    }
    
    const itemsHtml = invoice.items.map(item => {
      const productName = item.name || item.product_name || 'غير محدد';
      const category = item.category || '-';
      const quantity = parseInt(item.quantity || 0);
      const price = parseFloat(item.price || 0);
      
      return `
        <tr>
          <td>${productName}</td>
          <td>${category}</td>
          <td>${quantity}</td>
          <td>${formatPrice(price)}</td>
        </tr>
      `;
    }).join('');
    
    document.getElementById('itemsTableBody').innerHTML = itemsHtml;
    
  } catch (error) {
    document.getElementById('itemsTableBody').innerHTML = '<tr><td colspan="4" class="error">خطأ في تحميل بيانات الفاتورة</td></tr>';
  }
}

function printInvoice() {
  // Get invoice number for filename
  const invoiceNumber = document.getElementById('invoiceNumber').textContent;
  const filename = invoiceNumber && invoiceNumber !== '-' ? `${invoiceNumber}.pdf` : 'Rechnung.pdf';
  
  // Use window.print with title override
  const originalTitle = document.title;
  document.title = filename;
  
  window.print();
  
  // Restore original title after print dialog closes
  setTimeout(() => {
    document.title = originalTitle;
  }, 1000);
}

function closeWindow() {
  window.close();
}
</script>

</body>
</html>
